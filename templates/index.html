<!DOCTYPE html>
<html>
  <head>
    <title>Simple Input/Output Box</title>
  </head>
  <body>
    <h1>Simple Input/Output Example with Flask</h1>

    <form method="POST">
      <label for="user_input">Enter something:</label>
      <input type="text" id="user_input" name="user_input" required />
      <button type="submit">Submit</button>
    </form>

    {% if user_input %}
    <h3>Output:</h3>
    <textarea rows="5" cols="40" readonly>{{ user_input }}</textarea>
    {% endif %}
  </body>
</html>
